# Replace yourdomain.com with your actual domain
# Run: sed -i 's/yourdomain.com/yourdomain.com/g' nginx/conf.d/default.conf

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Session WebSocket proxy
    location /proxy/session/ {
        proxy_pass http://dashboard:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API and dashboard
    location / {
        proxy_pass http://dashboard:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name api.yourdomain.com;

    location / {
        proxy_pass http://dashboard:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Wildcard subdomain for hackathon apps
server {
    listen 80;
    server_name ~^(?P<slug>[^.]+)\.yourdomain\.com$;

    location / {
        proxy_pass http://dashboard:3001/proxy/app/$slug$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}
