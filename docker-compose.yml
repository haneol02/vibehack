services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - vibehack

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./projects:/projects
      - ./data:/data
      - ${HOST_HOME}/.claude:/root/.claude
      - ${HOST_HOME}/.claude.json:/root/.claude.json
      - /etc/machine-id:/etc/machine-id:ro
    networks:
      - vibehack
    depends_on:
      - redis

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      - DASHBOARD_API_URL=http://dashboard:3001
    networks:
      - vibehack
    depends_on:
      - redis
      - dashboard

  code-server:
    image: codercom/code-server:latest
    restart: unless-stopped
    user: root
    env_file: .env
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - PORT=8080
    volumes:
      - ./projects:/home/coder/projects
    networks:
      - vibehack

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - vibehack
    depends_on:
      - dashboard
      - code-server

  app-runner:
    build: ./app-runner
    image: vibehack-app-runner
    command: ["true"]
    profiles: ["build"]

networks:
  vibehack:
    name: vibehack
    driver: bridge
